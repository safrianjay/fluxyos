<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Journal Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
    <link rel="stylesheet" href="assets/css/accounting.css">
</head>
<body class="dashboard-page flex h-screen overflow-hidden text-gray-900 bg-gray-50">
    <aside id="sidebar" class="w-[220px] bg-white text-[#1E2F4A] flex flex-col flex-shrink-0 z-20 md:flex border-r border-slate-200 rounded-tl-[8px] overflow-hidden">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        <header class="dashboard-main-topbar h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-4">
            <div class="dashboard-topbar-copy">
                <span class="dashboard-topbar-title">Journal Detail</span>
                <p class="dashboard-topbar-subtitle hidden sm:block">Inspect a single double-entry journal and trace it end to end.</p>
            </div>
            <div class="flex items-center gap-3">
                <button type="button" id="journal-ask-ai" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[14px] font-bold hover:bg-orange-100 transition-all shadow-sm group" title="Open Fluxy AI">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Ask Fluxy AI
                </button>
                <a href="/accounting" class="acct-btn acct-btn-secondary" style="text-decoration:none;">Back to Accounting Center</a>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 sm:p-6 lg:p-8">
            <div class="acct-records-shell">
                <div id="journal-loading">
                    <div class="acct-card" style="padding:20px;max-width:880px;">
                        <div class="acct-skel" style="height:14px;width:200px;margin-bottom:16px"></div>
                        <div class="acct-skel" style="height:28px;width:280px;margin-bottom:24px"></div>
                        <div class="acct-skel" style="height:48px;width:100%;margin-bottom:10px"></div>
                        <div class="acct-skel" style="height:48px;width:100%;margin-bottom:10px"></div>
                        <div class="acct-skel" style="height:48px;width:100%"></div>
                    </div>
                </div>

                <div id="journal-error" class="hidden">
                    <div class="acct-card" style="padding:40px;text-align:center;max-width:520px;margin:48px auto;">
                        <div style="width:48px;height:48px;border-radius:12px;background:#FEF2F2;color:#B91C1C;display:grid;place-items:center;margin:0 auto 16px;">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path></svg>
                        </div>
                        <h2 class="fluxy-section-title" style="margin-bottom:8px;">Could not load this journal</h2>
                        <p id="journal-error-body" class="fluxy-body" style="color:#6B7280;margin-bottom:20px;">It may have been removed, or the link is incomplete.</p>
                        <a href="/accounting" class="acct-btn acct-btn-primary" style="margin:0 auto;text-decoration:none;display:inline-block;">Back to Accounting Center</a>
                    </div>
                </div>

                <div id="journal-content" class="hidden" style="max-width:980px;"></div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>
    <script src="assets/js/dashboard-i18n.js"></script>
    <script src="assets/js/fluxy-select.js"></script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import DataService from './assets/js/db-service.js';
        import { applyToPage } from './assets/js/onboarding-gate.js';
        import { initAccountingJournalPage } from './assets/js/accounting-journal.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDNynZIawmUQkTAVv71r4r9Sg661XvHVsA",
            authDomain: "fluxyos.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const ds = new DataService(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('/login');
                return;
            }
            const gated = await applyToPage(user, { pageKey: 'accounting' });
            if (gated) return;
            initAccountingJournalPage({ ds, user });
        });
    </script>
</body>
</html>
