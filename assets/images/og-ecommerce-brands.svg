<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Finance OS untuk E-Commerce Brands di Indonesia</title>
  <desc id="desc">Cocokkan settlement marketplace, lihat margin asli, dan tutup buku tanpa spreadsheet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F19"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.25" r="0.68">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.48"/>
      <stop offset="0.5" stop-color="#EA580C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1010" cy="120" r="220" fill="#7C3AED" opacity="0.12"/>
  <circle cx="1110" cy="520" r="190" fill="#EA580C" opacity="0.14"/>
  <g transform="translate(84 110)">
    <rect x="0" y="0" width="58" height="58" rx="12" fill="#FFFFFF"/>
    <g transform="translate(2 0)">
      <path d="M 10 9 L 48 9 L 39 18 L 19 18 L 19 49 L 10 49 Z" fill="#0B0F19"/>
      <path d="M 25 27 L 39 27 L 30 36 L 25 36 Z" fill="#0B0F19"/>
    </g>
    <text x="78" y="39" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="0">FluxyOS</text>
  </g>
  <g transform="translate(84 228)">
    <text x="0" y="0" fill="#FDBA74" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="3">E-COMMERCE BRANDS</text>
    <text x="0" y="84" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="850" letter-spacing="0">Finance OS untuk</text>
    <text x="0" y="150" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="850" letter-spacing="0">online store Indonesia</text>
    <text x="0" y="232" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0">Cocokkan payout marketplace, ad spend,</text>
    <text x="0" y="268" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0">COGS, dan net margin dalam satu ledger.</text>
  </g>
  <g transform="translate(842 236)" opacity="0.96">
    <rect x="0" y="0" width="286" height="250" rx="24" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <rect x="30" y="34" width="226" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.72"/>
    <g transform="translate(30 82)">
      <circle cx="16" cy="16" r="16" fill="#22C55E" fill-opacity="0.85"/>
      <rect x="46" y="5" width="132" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.34"/>
      <rect x="46" y="27" width="190" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.18"/>
    </g>
    <g transform="translate(30 136)">
      <circle cx="16" cy="16" r="16" fill="#EA580C" fill-opacity="0.9"/>
      <rect x="46" y="5" width="158" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.34"/>
      <rect x="46" y="27" width="172" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.18"/>
    </g>
    <g transform="translate(30 190)">
      <circle cx="16" cy="16" r="16" fill="#3B82F6" fill-opacity="0.85"/>
      <rect x="46" y="5" width="116" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.34"/>
      <rect x="46" y="27" width="202" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.18"/>
    </g>
  </g>
  <text x="84" y="574" fill="#9CA3AF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="0">https://fluxyos.com/id/use-cases/ecommerce-brands</text>
