    <text x="0" y="232" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0">Track cloud bills, renewals, receipts,</text>
    <text x="0" y="268" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0">and startup finance risks in one view.</text>
  </g>
