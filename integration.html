<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Integrations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-[260px] bg-[#0B0F19] text-gray-300 flex flex-col flex-shrink-0 z-20 md:flex border-r border-gray-800 transition-all duration-300">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-lg font-bold text-gray-900">Integrations</h1>
            </div>

            <!-- Right: AI Entry Point -->
            <div class="flex items-center gap-4">
                <button onclick="window.toggleFluxyAI()" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[13px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Fluxy AI
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <div class="mb-8">
                    <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Connected Apps</h2>
                    <p class="text-[14px] text-gray-500 mt-1">Connect your financial stack to automate data synchronization.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <!-- Bank Central Asia -->
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col items-center text-center">
                        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                            <span class="text-blue-600 font-bold">BCA</span>
                        </div>
                        <h3 class="font-bold text-gray-900">BCA Business</h3>
                        <p class="text-[11px] text-gray-400 mt-1 mb-4 italic">Bank / Indonesia</p>
                        <button class="w-full py-2 bg-gray-50 border border-gray-200 rounded-lg text-[13px] font-bold text-gray-600 hover:bg-gray-100 transition-colors">Connect</button>
                    </div>

                    <!-- Meta Ads -->
                    <div class="bg-white p-6 rounded-xl border border-blue-100 shadow-sm flex flex-col items-center text-center ring-2 ring-blue-50">
                        <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        </div>
                        <h3 class="font-bold text-gray-900">Meta Ads</h3>
                        <p class="text-[11px] text-green-500 mt-1 mb-4 font-bold flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            Linked
                        </p>
                        <button class="w-full py-2 bg-white border border-gray-200 rounded-lg text-[13px] font-bold text-red-500 hover:bg-red-50 transition-colors">Disconnect</button>
                    </div>

                    <!-- Stripe -->
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex flex-col items-center text-center">
                        <div class="w-16 h-16 bg-[#635BFF] rounded-full flex items-center justify-center mb-4">
                            <span class="text-white font-bold text-2xl italic">s</span>
                        </div>
                        <h3 class="font-bold text-gray-900">Stripe</h3>
                        <p class="text-[11px] text-gray-400 mt-1 mb-4 italic">Payments / Global</p>
                        <button class="w-full py-2 bg-gray-50 border border-gray-200 rounded-lg text-[13px] font-bold text-gray-600 hover:bg-gray-100 transition-colors">Connect</button>
                    </div>

                    <!-- Add New -->
                    <div class="bg-gray-50 p-6 rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-center group cursor-pointer hover:border-[#EA580C] transition-colors">
                        <div class="w-12 h-12 rounded-full border-2 border-gray-300 flex items-center justify-center mb-2 group-hover:border-[#EA580C]">
                            <svg class="w-6 h-6 text-gray-400 group-hover:text-[#EA580C]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </div>
                        <span class="text-[13px] font-bold text-gray-500 group-hover:text-[#EA580C]">Request Connector</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>

    <!-- AUTH GUARD -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaJqmpEMulLdMvRT7mYf2K-XDw46-dT7A",
            authDomain: "fluxyos.firebaseapp.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360",
            measurementId: "G-ZN7J6DRD2L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // SMART AUTH GUARD
        let checkTimeout = setTimeout(() => {
            window.location.replace('/login');
        }, 2000);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                clearTimeout(checkTimeout);
            }
        });
    </script>
</body>
</html>
