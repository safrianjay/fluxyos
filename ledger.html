<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Ledger & Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-[220px] bg-white text-[#1E2F4A] flex flex-col flex-shrink-0 z-20 md:flex border-r border-slate-200 rounded-tl-[8px] overflow-hidden">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        
        <!-- Header / Topbar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="hidden sm:flex relative w-full max-w-lg">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Search transactions, tags, or vendors..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-transparent rounded-lg text-[13px] focus:outline-none focus:bg-white focus:ring-1 focus:ring-[#EA580C] focus:border-[#EA580C] transition-all">
                </div>
            </div>

            <!-- Right: AI Entry Point -->
            <div class="flex items-center gap-4">
                <button onclick="window.toggleFluxyAI()" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[13px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Fluxy AI
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Financial Ledger</h1>
                        <p class="text-[14px] text-gray-500 mt-1">Full audit trail of all transactions across your network.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="download-csv-btn" type="button" class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-[13px] font-bold text-gray-700 hover:bg-gray-50 transition-all duration-200 flex items-center gap-2 shadow-sm active:scale-95 disabled:cursor-not-allowed disabled:opacity-60" disabled>
                            <svg id="download-csv-icon" class="w-4 h-4 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"></path></svg>
                            <span id="download-csv-label">Download CSV</span>
                        </button>
                        <button onclick="window.showAddTransactionModal()" class="px-4 py-2 bg-[#EA580C] text-white rounded-lg text-[13px] font-bold hover:bg-[#D94E0B] transition-colors flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            Add Transaction
                        </button>
                    </div>
                </div>

                <!-- Ledger Table Card -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mt-6">
                    <div id="ledger-empty-state" class="hidden"></div>
                    
                    <div id="ledger-table-container" class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                                        <button type="button" class="ledger-sort-btn inline-flex items-center gap-1 hover:text-gray-900 transition-colors" data-sort-key="date">
                                            Date <span class="ledger-sort-icon text-gray-400" aria-hidden="true"></span>
                                        </button>
                                    </th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Description</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                                        <button type="button" class="ledger-sort-btn inline-flex items-center gap-1 hover:text-gray-900 transition-colors" data-sort-key="category">
                                            Category <span class="ledger-sort-icon text-gray-400" aria-hidden="true"></span>
                                        </button>
                                    </th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                                        <button type="button" class="ledger-sort-btn inline-flex items-center gap-1 hover:text-gray-900 transition-colors" data-sort-key="amount">
                                            Amount <span class="ledger-sort-icon text-gray-400" aria-hidden="true"></span>
                                        </button>
                                    </th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">
                                        <button type="button" class="ledger-sort-btn inline-flex items-center gap-1 hover:text-gray-900 transition-colors" data-sort-key="status">
                                            Status <span class="ledger-sort-icon text-gray-400" aria-hidden="true"></span>
                                        </button>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="ledger-table-body" class="divide-y divide-gray-100 text-[13px]">
                                <tr>
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-400">
                                        Fetching ledger data...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="ledger-pagination" class="hidden border-t border-gray-100 bg-gray-50/50 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <p id="ledger-page-summary" class="text-[12px] font-medium text-gray-500">Showing 0 transactions</p>
                        <div class="flex items-center gap-2">
                            <button id="ledger-prev-page" type="button" class="px-3 py-2 bg-white border border-gray-200 rounded-lg text-[12px] font-bold text-gray-600 hover:bg-gray-50 transition-all active:scale-95 disabled:cursor-not-allowed disabled:opacity-50">Previous</button>
                            <span id="ledger-page-indicator" class="min-w-16 text-center text-[12px] font-bold text-gray-600">1 / 1</span>
                            <button id="ledger-next-page" type="button" class="px-3 py-2 bg-white border border-gray-200 rounded-lg text-[12px] font-bold text-gray-600 hover:bg-gray-50 transition-all active:scale-95 disabled:cursor-not-allowed disabled:opacity-50">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>

    <!-- AUTH GUARD & DATA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import DataService from './assets/js/db-service.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCaJqmpEMulLdMvRT7mYf2K-XDw46-dT7A",
            authDomain: "fluxyos.firebaseapp.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const ds = new DataService(app);
        let currentLedgerTransactions = [];
        const LEDGER_PAGE_SIZE = 10;
        let ledgerCurrentPage = 1;
        let ledgerSortKey = 'date';
        let ledgerSortDirection = 'desc';

        // SMART AUTH GUARD
        let checkTimeout = setTimeout(() => {
            window.location.replace('/login');
        }, 2000);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                clearTimeout(checkTimeout);
                window.loadLedger();
            }
        });

        window.loadLedger = async function() {
            const user = auth.currentUser;
            if (!user) return;

            const body = document.getElementById('ledger-table-body');
            const tableContainer = document.getElementById('ledger-table-container');
            const emptyContainer = document.getElementById('ledger-empty-state');
            const pagination = document.getElementById('ledger-pagination');
            const downloadBtn = document.getElementById('download-csv-btn');
            
            if (!body) return;
            
            const transactions = await ds.getTransactions(user.uid, 100);
            currentLedgerTransactions = transactions;
            if (downloadBtn) downloadBtn.disabled = transactions.length === 0;

            if (transactions.length === 0) {
                tableContainer.classList.add('hidden');
                pagination?.classList.add('hidden');
                emptyContainer.classList.remove('hidden');
                window.renderEmptyState('ledger-empty-state', {
                    title: "Your financial trail starts here.",
                    description: "No transactions found in your live ledger. Log your first expense or revenue point to start tracking your business engine.",
                    buttonText: "Log First Transaction",
                    onAction: () => window.showAddTransactionModal()
                });
            } else {
                tableContainer.classList.remove('hidden');
                pagination?.classList.remove('hidden');
                emptyContainer.classList.add('hidden');
                ledgerCurrentPage = 1;
                renderLedgerTable();
            }
        }

        function getTimestampMs(row) {
            return row.timestamp?.toDate ? row.timestamp.toDate().getTime() : 0;
        }

        function getSortValue(row, key) {
            if (key === 'date') return getTimestampMs(row);
            if (key === 'amount') return Number(row.amount) || 0;
            if (key === 'category') return String(row.category || '').toLowerCase();
            if (key === 'status') return String(row.status || '').toLowerCase();
            return '';
        }

        function getSortedLedgerRows() {
            return [...currentLedgerTransactions].sort((a, b) => {
                const first = getSortValue(a, ledgerSortKey);
                const second = getSortValue(b, ledgerSortKey);
                let result = 0;

                if (typeof first === 'number' && typeof second === 'number') {
                    result = first - second;
                } else {
                    result = String(first).localeCompare(String(second));
                }

                return ledgerSortDirection === 'asc' ? result : -result;
            });
        }

        function updateSortIndicators() {
            document.querySelectorAll('.ledger-sort-btn').forEach(button => {
                const icon = button.querySelector('.ledger-sort-icon');
                const isActive = button.dataset.sortKey === ledgerSortKey;
                button.classList.toggle('text-gray-900', isActive);
                if (icon) {
                    icon.innerHTML = isActive
                        ? (ledgerSortDirection === 'asc'
                            ? '<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="m18 15-6-6-6 6"/></svg>'
                            : '<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="m6 9 6 6 6-6"/></svg>')
                        : '<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="m8 9 4-4 4 4M16 15l-4 4-4-4"/></svg>';
                }
            });
        }

        function renderLedgerTable() {
            const body = document.getElementById('ledger-table-body');
            const summary = document.getElementById('ledger-page-summary');
            const indicator = document.getElementById('ledger-page-indicator');
            const prevButton = document.getElementById('ledger-prev-page');
            const nextButton = document.getElementById('ledger-next-page');
            if (!body) return;

            const sortedRows = getSortedLedgerRows();
            const totalPages = Math.max(1, Math.ceil(sortedRows.length / LEDGER_PAGE_SIZE));
            ledgerCurrentPage = Math.min(Math.max(ledgerCurrentPage, 1), totalPages);
            const startIndex = (ledgerCurrentPage - 1) * LEDGER_PAGE_SIZE;
            const visibleRows = sortedRows.slice(startIndex, startIndex + LEDGER_PAGE_SIZE);

            body.innerHTML = visibleRows.map(row => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4 text-gray-500">${row.timestamp?.toDate().toLocaleString() || 'Just now'}</td>
                    <td class="px-6 py-4 font-bold text-gray-900">${row.vendor_name}</td>
                    <td class="px-6 py-4 text-gray-500">${row.category}</td>
                    <td class="px-6 py-4 font-mono font-bold ${row.type === 'revenue' ? 'text-green-600' : 'text-gray-900'}">
                        ${row.type === 'revenue' ? '+' : ''}Rp ${Math.abs(row.amount).toLocaleString()}
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${row.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                            ${row.status}
                        </span>
                    </td>
                </tr>
            `).join('');

            if (summary) {
                const endIndex = Math.min(startIndex + visibleRows.length, sortedRows.length);
                summary.textContent = `Showing ${startIndex + 1}-${endIndex} of ${sortedRows.length} transactions`;
            }
            if (indicator) indicator.textContent = `${ledgerCurrentPage} / ${totalPages}`;
            if (prevButton) prevButton.disabled = ledgerCurrentPage === 1;
            if (nextButton) nextButton.disabled = ledgerCurrentPage === totalPages;
            updateSortIndicators();
        }

        document.querySelectorAll('.ledger-sort-btn').forEach(button => {
            button.addEventListener('click', () => {
                const nextKey = button.dataset.sortKey;
                if (ledgerSortKey === nextKey) {
                    ledgerSortDirection = ledgerSortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    ledgerSortKey = nextKey;
                    ledgerSortDirection = nextKey === 'date' ? 'desc' : 'asc';
                }
                ledgerCurrentPage = 1;
                renderLedgerTable();
            });
        });

        document.getElementById('ledger-prev-page')?.addEventListener('click', () => {
            ledgerCurrentPage -= 1;
            renderLedgerTable();
        });

        document.getElementById('ledger-next-page')?.addEventListener('click', () => {
            ledgerCurrentPage += 1;
            renderLedgerTable();
        });

        function formatCsvDate(timestamp) {
            if (!timestamp?.toDate) return '';
            return timestamp.toDate().toISOString();
        }

        function escapeCsvValue(value) {
            const text = String(value ?? '');
            return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }

        function buildLedgerCsv(rows) {
            const headers = ['Date', 'Description', 'Category', 'Type', 'Amount', 'Status'];
            const records = rows.map(row => [
                formatCsvDate(row.timestamp),
                row.vendor_name,
                row.category,
                row.type,
                row.amount,
                row.status
            ]);

            return [headers, ...records]
                .map(record => record.map(escapeCsvValue).join(','))
                .join('\n');
        }

        function downloadTextFile(filename, text) {
            const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        function setDownloadButtonState(state) {
            const button = document.getElementById('download-csv-btn');
            const label = document.getElementById('download-csv-label');
            const icon = document.getElementById('download-csv-icon');
            if (!button || !label || !icon) return;

            if (state === 'loading') {
                button.disabled = true;
                button.classList.add('ring-2', 'ring-orange-100');
                icon.classList.add('animate-bounce');
                label.textContent = 'Exporting...';
                return;
            }

            if (state === 'success') {
                icon.classList.remove('animate-bounce');
                button.classList.remove('ring-2', 'ring-orange-100');
                button.classList.add('border-green-200', 'text-green-700', 'bg-green-50');
                label.textContent = 'Downloaded';
                return;
            }

            icon.classList.remove('animate-bounce');
            button.classList.remove('ring-2', 'ring-orange-100', 'border-green-200', 'text-green-700', 'bg-green-50');
            label.textContent = 'Download CSV';
            button.disabled = currentLedgerTransactions.length === 0;
        }

        document.getElementById('download-csv-btn')?.addEventListener('click', () => {
            if (currentLedgerTransactions.length === 0) return;

            setDownloadButtonState('loading');
            window.setTimeout(() => {
                const csv = buildLedgerCsv(currentLedgerTransactions);
                const date = new Date().toISOString().slice(0, 10);
                downloadTextFile(`fluxyos-ledger-${date}.csv`, csv);
                setDownloadButtonState('success');
                window.setTimeout(() => setDownloadButtonState('idle'), 1200);
            }, 180);
        });
    </script>
</body>
</html>
