<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Ledger & Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-[260px] bg-[#0B0F19] text-gray-300 flex flex-col flex-shrink-0 z-20 md:flex border-r border-gray-800 transition-all duration-300">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        
        <!-- Header / Topbar -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="hidden sm:flex relative w-full max-w-lg">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Search transactions, tags, or vendors..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-transparent rounded-lg text-[13px] focus:outline-none focus:bg-white focus:ring-1 focus:ring-[#EA580C] focus:border-[#EA580C] transition-all">
                </div>
            </div>

            <!-- Right: AI Entry Point -->
            <div class="flex items-center gap-4">
                <button onclick="window.toggleFluxyAI()" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[13px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Fluxy AI
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-7xl mx-auto space-y-6">
                
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Financial Ledger</h1>
                        <p class="text-[14px] text-gray-500 mt-1">Full audit trail of all transactions across your network.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button class="px-4 py-2 bg-white border border-gray-200 rounded-lg text-[13px] font-bold text-gray-700 hover:bg-gray-50 transition-colors">Download PDF</button>
                        <button onclick="window.showAddTransactionModal()" class="px-4 py-2 bg-[#EA580C] text-white rounded-lg text-[13px] font-bold hover:bg-[#D94E0B] transition-colors flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            Add Transaction
                        </button>
                    </div>
                </div>

                <!-- Ledger Table Card -->
                <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden mt-6">
                    <div id="ledger-empty-state" class="hidden"></div>
                    
                    <div id="ledger-table-container" class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Date</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Description</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Category</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Amount</th>
                                    <th class="px-6 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-wider">Status</th>
                                </tr>
                            </thead>
                            <tbody id="ledger-table-body" class="divide-y divide-gray-100 text-[13px]">
                                <tr>
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-400">
                                        Fetching ledger data...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>

    <!-- AUTH GUARD & DATA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import DataService from './assets/js/db-service.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCaJqmpEMulLdMvRT7mYf2K-XDw46-dT7A",
            authDomain: "fluxyos.firebaseapp.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const ds = new DataService(app);

        // SMART AUTH GUARD
        let checkTimeout = setTimeout(() => {
            window.location.replace('/login');
        }, 2000);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                clearTimeout(checkTimeout);
                window.loadLedger();
            }
        });

        window.loadLedger = async function() {
            const user = auth.currentUser;
            if (!user) return;

            const body = document.getElementById('ledger-table-body');
            const tableContainer = document.getElementById('ledger-table-container');
            const emptyContainer = document.getElementById('ledger-empty-state');
            
            if (!body) return;
            
            const transactions = await ds.getTransactions(user.uid, 100);

            if (transactions.length === 0) {
                tableContainer.classList.add('hidden');
                emptyContainer.classList.remove('hidden');
                window.renderEmptyState('ledger-empty-state', {
                    title: "Your financial trail starts here.",
                    description: "No transactions found in your live ledger. Log your first expense or revenue point to start tracking your business engine.",
                    buttonText: "Log First Transaction",
                    onAction: () => window.showAddTransactionModal()
                });
            } else {
                tableContainer.classList.remove('hidden');
                emptyContainer.classList.add('hidden');
                body.innerHTML = transactions.map(row => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 text-gray-500">${row.timestamp?.toDate().toLocaleString() || 'Just now'}</td>
                        <td class="px-6 py-4 font-bold text-gray-900">${row.vendor_name}</td>
                        <td class="px-6 py-4 text-gray-500">${row.category}</td>
                        <td class="px-6 py-4 font-mono font-bold ${row.type === 'revenue' ? 'text-green-600' : 'text-gray-900'}">
                            ${row.type === 'revenue' ? '+' : ''}Rp ${Math.abs(row.amount).toLocaleString()}
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${row.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                                ${row.status}
                            </span>
                        </td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>
