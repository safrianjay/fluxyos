[build]
  publish = "."
  functions = "netlify/functions"

# Security headers — applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Tighten script-src once all CDN origins are audited.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://accounts.google.com https://www.googleapis.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com; frame-src 'self' https://*.firebaseapp.com https://accounts.google.com https://apis.google.com; frame-ancestors 'none';"

[build.processing.html]
  pretty_urls = true

# Firebase Auth helper pages must be served from the app authDomain.
# Netlify hosts fluxyos.com, so proxy these paths to Firebase Hosting.
[[redirects]]
  from = "/__/auth/*"
  to = "https://fluxyos.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://fluxyos.netlify.app/fluxyos"
  to = "https://fluxyos.com/"
  status = 301
  force = true

[[redirects]]
  from = "https://fluxyos.netlify.app/*"
  to = "https://fluxyos.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.fluxyos.com/*"
  to = "https://fluxyos.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/ecommerce-brands"
  to = "/use-cases/ecommerce-brands"
  status = 301
  force = true

[[redirects]]
  from = "/marketing-agencies"
  to = "/use-cases/marketing-agencies"
  status = 301
  force = true

[[redirects]]
  from = "/dropshippers-digital-ads"
  to = "/use-cases/dropshippers-digital-ads"
  status = 301
  force = true

[[redirects]]
  from = "/manufacturing"
  to = "/use-cases/manufacturing"
  status = 301
  force = true

[[redirects]]
  from = "/retail-franchises"
  to = "/use-cases/retail-franchises"
  status = 301
  force = true

# Bank statement extraction runs as a background function (async, ~15-min budget).
# Must precede the /api/v1/* catch-all below.
[[redirects]]
  from = "/api/v1/bank-statements/extract"
  to = "/.netlify/functions/bank-statement-extract-background"
  status = 200

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/budget-period/:periodId"
  to = "/budget-period.html"
  status = 200

[[redirects]]
  from = "/budget-allocation/:allocationId"
  to = "/budget-allocation.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/fluxyos.html"
  status = 200
  force = true
