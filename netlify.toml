[build]
  publish = "."
  functions = "netlify/functions"

# Security headers — applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Tighten script-src once all CDN origins are audited.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://www.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; frame-ancestors 'none';"

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "https://fluxyos.netlify.app/fluxyos"
  to = "https://fluxyos.com/"
  status = 301
  force = true

[[redirects]]
  from = "https://fluxyos.netlify.app/*"
  to = "https://fluxyos.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.fluxyos.com/*"
  to = "https://fluxyos.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/ecommerce-brands"
  to = "/use-cases/ecommerce-brands"
  status = 301
  force = true

[[redirects]]
  from = "/marketing-agencies"
  to = "/use-cases/marketing-agencies"
  status = 301
  force = true

[[redirects]]
  from = "/dropshippers-digital-ads"
  to = "/use-cases/dropshippers-digital-ads"
  status = 301
  force = true

[[redirects]]
  from = "/manufacturing"
  to = "/use-cases/manufacturing"
  status = 301
  force = true

[[redirects]]
  from = "/retail-franchises"
  to = "/use-cases/retail-franchises"
  status = 301
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/fluxyos.html"
  status = 200
  force = true
