<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Language &amp; Region</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <aside id="sidebar" class="hidden w-[220px] bg-white text-[#1E2F4A] flex-col flex-shrink-0 z-20 md:flex border-r border-slate-200 rounded-tl-[8px] overflow-hidden">
        <!-- Sidebar content loaded by sidebar-loader.js -->
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 min-w-0 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900" aria-label="Open menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 class="text-lg font-bold text-gray-900">Language &amp; Region</h1>
            </div>
            <button onclick="window.toggleFluxyAI()" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[14px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Fluxy AI
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-10">
            <div class="max-w-3xl mx-auto space-y-6">

                <section>
                    <a href="/settings" class="text-[12px] font-bold text-[#EA580C] hover:underline">Settings</a>
                    <h1 class="mt-2 text-2xl font-bold text-gray-900 tracking-tight">Language &amp; Region</h1>
                    <p class="mt-1 text-[14px] text-gray-500">Choose the language FluxyOS uses across the dashboard, reports, and Fluxy AI.</p>
                </section>

                <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
                    <div class="p-5">
                        <label for="app-language" class="block">
                            <span class="text-[12px] font-bold text-gray-500">Display language</span>
                            <select id="app-language" name="app_language" class="mt-1 w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-[14px] text-gray-900 outline-none focus:border-[#EA580C] focus:ring-2 focus:ring-orange-100">
                                <option value="en">English</option>
                                <option value="id">Bahasa Indonesia</option>
                            </select>
                        </label>
                    </div>
                    <div class="px-5 py-4 border-t border-gray-100 bg-gray-50/50">
                        <p class="text-[12px] text-gray-500">The interface switches immediately. Amounts always stay in Rupiah (Rp).</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>
    <script src="assets/js/dashboard-i18n.js"></script>
    <script src="assets/js/fluxy-select.js"></script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNynZIawmUQkTAVv71r4r9Sg661XvHVsA",
            authDomain: "fluxyos.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360",
            measurementId: "G-ZN7J6DRD2L"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);

        const authTimeout = setTimeout(() => window.location.replace('/login'), 2000);
        onAuthStateChanged(auth, (user) => {
            if (user) clearTimeout(authTimeout);
        });

        // Language preference lives in localStorage('fluxyos-lang') — the single
        // source of truth read by the i18n engine on every page (and the landing
        // site). No Firestore write: the finance settings doc is field-locked by
        // rules, so this stays a fast, per-device UI preference.
        const select = document.getElementById('app-language');
        if (select && window.FluxyI18n) {
            select.value = window.FluxyI18n.getLang();
            select.addEventListener('change', () => {
                const lang = select.value === 'id' ? 'id' : 'en';
                // setLang('en') reloads the page; setLang('id') translates in place.
                if (lang === 'id') window.showToast?.('Language preference saved.', 'success');
                window.FluxyI18n.setLang(lang);
            });
        }
    </script>
</body>
</html>
