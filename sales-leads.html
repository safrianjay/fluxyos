<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Sales Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-[220px] bg-white text-[#1E2F4A] flex flex-col flex-shrink-0 z-20 md:flex border-r border-slate-200 rounded-tl-[8px] overflow-hidden">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="hidden sm:flex relative w-full max-w-lg">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input id="leads-search-input" type="text" placeholder="Search leads by name, email, company..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-transparent rounded-lg text-[14px] focus:outline-none focus:bg-white focus:ring-1 focus:ring-[#EA580C] focus:border-[#EA580C] transition-all">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.toggleFluxyAI()" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[14px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Fluxy AI
                </button>
            </div>
        </header>

        <div class="fluxy-page-shell">
            <div class="fluxy-page-canvas fluxy-section-stack">
                <div class="fluxy-page-header">
                    <div class="fluxy-page-header-main">
                        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Sales Leads</h1>
                        <p class="text-[14px] text-gray-500 mt-1">Track prospects and send the bilingual meeting-reminder outreach.</p>
                    </div>
                    <div class="fluxy-page-actions">
                        <button onclick="window.openLeadModal()" class="px-4 py-2 bg-[#EA580C] text-white rounded-lg text-[14px] font-bold hover:bg-[#D94E0B] transition-colors flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            New outreach
                        </button>
                    </div>
                </div>

                <div class="fluxy-table-card">
                    <div class="fluxy-table-card-header">
                        <div>
                            <h2 class="fluxy-table-title">Your leads</h2>
                            <p class="fluxy-table-subtitle">Prospects you've reached out to, with meeting times and outreach status.</p>
                        </div>
                    </div>
                    <div id="leads-empty-state" class="hidden"></div>
                    <div id="leads-table-container" class="fluxy-table-scroll">
                        <table class="fluxy-table min-w-[900px]">
                            <thead>
                                <tr class="fluxy-table-header">
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Company</th>
                                    <th>Meeting</th>
                                    <th>Status</th>
                                    <th class="fluxy-table-action">Action</th>
                                </tr>
                            </thead>
                            <tbody id="leads-table-body">
                                <tr>
                                    <td colspan="7" class="fluxy-table-loading-cell">Loading your leads...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>
    <script src="assets/js/dashboard-i18n.js"></script>
    <script src="assets/js/fluxy-select.js"></script>
    <script src="assets/js/date-range-picker.js"></script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import DataService from './assets/js/db-service.js';
        import { applyToPage } from './assets/js/onboarding-gate.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDNynZIawmUQkTAVv71r4r9Sg661XvHVsA",
            authDomain: "fluxyos.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const ds = new DataService(app);
        let allLeads = [];

        const STATUS_LABELS = { new: 'New', sent: 'Outreach sent', meeting_booked: 'Meeting booked', closed: 'Closed' };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const gated = await applyToPage(user, { pageKey: 'sales_leads' });
                if (gated) return;
                await window.loadLeads();
            } else {
                window.location.replace('/login');
            }
        });

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatMeeting(ts) {
            try {
                const dt = ts && typeof ts.toDate === 'function' ? ts.toDate() : (ts ? new Date(ts) : null);
                if (!dt || isNaN(dt.getTime())) return '—';
                return dt.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' }) + ' WIB';
            } catch (_) { return '—'; }
        }

        function meetingISOFromLead(lead) {
            const dt = lead.meeting_at && typeof lead.meeting_at.toDate === 'function' ? lead.meeting_at.toDate() : (lead.meeting_at ? new Date(lead.meeting_at) : null);
            return dt && !isNaN(dt.getTime()) ? dt.toISOString() : null;
        }

        function filterLeads(query) {
            const q = String(query || '').trim().toLowerCase();
            if (!q) return allLeads;
            return allLeads.filter(l =>
                String(l.name || '').toLowerCase().includes(q)
                || String(l.email || '').toLowerCase().includes(q)
                || String(l.company || '').toLowerCase().includes(q));
        }

        function statusSelectHtml(lead) {
            const opts = Object.keys(STATUS_LABELS).map(v =>
                `<option value="${v}" ${lead.status === v ? 'selected' : ''}>${STATUS_LABELS[v]}</option>`).join('');
            return `<select data-lead-status data-lead-id="${escapeHtml(lead.id)}" class="text-[13px] py-1.5 pl-3 pr-8 bg-white border border-gray-200 rounded-lg">${opts}</select>`;
        }

        function renderLeads() {
            const body = document.getElementById('leads-table-body');
            const tableContainer = document.getElementById('leads-table-container');
            const emptyContainer = document.getElementById('leads-empty-state');
            if (!body || !tableContainer || !emptyContainer) return;

            if (allLeads.length === 0) {
                tableContainer.classList.add('hidden');
                emptyContainer.classList.remove('hidden');
                window.renderEmptyState('leads-empty-state', {
                    title: "No leads yet.",
                    description: "Add your first prospect and send them the bilingual meeting reminder in one step.",
                    buttonText: "New outreach",
                    onAction: () => window.openLeadModal()
                });
                return;
            }

            tableContainer.classList.remove('hidden');
            emptyContainer.classList.add('hidden');
            const leads = filterLeads(document.getElementById('leads-search-input')?.value || '');
            if (leads.length === 0) {
                body.innerHTML = `<tr><td colspan="7" class="fluxy-table-loading-cell">No leads match your search.</td></tr>`;
                return;
            }
            body.innerHTML = leads.map(lead => `
                <tr class="fluxy-table-row" data-lead-id="${escapeHtml(lead.id)}">
                    <td class="fluxy-table-cell"><span class="fluxy-table-cell-primary">${escapeHtml(lead.name || 'Unknown')}</span></td>
                    <td class="fluxy-table-cell">${escapeHtml(lead.email || '—')}</td>
                    <td class="fluxy-table-cell fluxy-table-cell-meta">${escapeHtml(lead.role || '—')}</td>
                    <td class="fluxy-table-cell fluxy-table-cell-meta">${escapeHtml(lead.company || '—')}</td>
                    <td class="fluxy-table-cell fluxy-table-cell-meta">${formatMeeting(lead.meeting_at)}</td>
                    <td class="fluxy-table-cell">${statusSelectHtml(lead)}</td>
                    <td class="fluxy-table-cell fluxy-table-action">
                        <div class="flex items-center justify-end gap-3">
                            <button data-action="resend" data-lead-id="${escapeHtml(lead.id)}" class="text-[13px] font-semibold text-[#EA580C] hover:text-[#D94E0B] transition-colors">Resend</button>
                            <button data-action="delete" data-lead-id="${escapeHtml(lead.id)}" title="Delete lead" class="text-gray-300 hover:text-red-500 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.loadLeads = async function() {
            const user = auth.currentUser;
            if (!user) return;
            allLeads = await ds.getLeads(user.uid);
            renderLeads();
        };

        document.getElementById('leads-search-input')?.addEventListener('input', renderLeads);

        // POST to the authenticated send endpoint. Returns the parsed JSON (throws on non-2xx).
        async function postOutreach({ name, gender, email, meetingISO, role, company }) {
            const user = auth.currentUser;
            if (!user) throw new Error('Not signed in');
            const token = await user.getIdToken();
            const res = await fetch('/.netlify/functions/send-lead-outreach', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                body: JSON.stringify({ name, gender, email, meetingISO, role, company }),
            });
            const out = await res.json().catch(() => ({}));
            if (!res.ok || (out && out.error)) throw new Error((out && out.error) || `Send failed (${res.status})`);
            return out;
        }

        // ---- Send-outreach popup ----
        let leadDatePicker = null;
        let leadDateKey = null;

        window.openLeadModal = function() {
            if (document.getElementById('lead-modal')) return;
            const todayKey = window.FluxyDateRangePicker?.getDayKey?.() || new Date().toISOString().slice(0, 10);
            leadDateKey = todayKey;
            const inputCls = 'w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-[14px] focus:outline-none focus:ring-2 focus:ring-[#EA580C]/40 focus:border-[#EA580C] transition-all';
            const labelCls = 'block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2';
            const html = `
                <div id="lead-modal" class="fixed inset-0 z-[120] flex items-center justify-center p-4">
                    <div id="lead-overlay" class="absolute inset-0 bg-[#0B0F19]/50 opacity-0 transition-opacity duration-200" style="backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);"></div>
                    <div id="lead-card" class="relative z-10 w-full max-w-[480px] max-h-[90vh] overflow-y-auto bg-white rounded-2xl border border-gray-200 shadow-[0_24px_48px_rgba(11,15,25,0.18)] opacity-0 translate-y-3 transition-all duration-200">
                        <div class="px-6 pt-6 pb-4 flex items-start justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900 tracking-tight">Send outreach</h3>
                                <p class="text-[13px] text-gray-500 mt-1">Save this lead and email the bilingual meeting reminder.</p>
                            </div>
                            <button type="button" data-close class="text-gray-400 hover:text-gray-600 -mt-1 -mr-1 p-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                        <form id="lead-form" class="px-6 pb-6 space-y-4" novalidate>
                            <div>
                                <label for="lf-name" class="${labelCls}">Name</label>
                                <input id="lf-name" type="text" required placeholder="e.g. Anissa Swastika" class="${inputCls}">
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label for="lf-gender" class="${labelCls}">Gender</label>
                                    <select id="lf-gender" class="${inputCls}">
                                        <option value="female">Female (Ibu / Mrs)</option>
                                        <option value="male">Male (Bapak / Mr)</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="lf-time" class="${labelCls}">Meeting time (WIB)</label>
                                    <input id="lf-time" type="time" value="15:00" class="${inputCls}">
                                </div>
                            </div>
                            <div>
                                <label for="lf-email" class="${labelCls}">Email</label>
                                <input id="lf-email" type="email" required placeholder="name@company.com" class="${inputCls}">
                            </div>
                            <div>
                                <label class="${labelCls}">Meeting date</label>
                                <div id="lf-date-host"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label for="lf-role" class="${labelCls}">Role</label>
                                    <input id="lf-role" type="text" placeholder="e.g. Founder" class="${inputCls}">
                                </div>
                                <div>
                                    <label for="lf-company" class="${labelCls}">Company</label>
                                    <input id="lf-company" type="text" placeholder="e.g. Acme" class="${inputCls}">
                                </div>
                            </div>
                            <button type="submit" id="lf-submit" class="w-full py-3 bg-[#EA580C] hover:bg-[#D94E0B] text-white font-bold rounded-xl text-[14px] shadow-sm transition-all active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed">Save &amp; send outreach</button>
                        </form>
                    </div>
                </div>`;
            const wrap = document.createElement('div');
            wrap.innerHTML = html;
            document.body.appendChild(wrap.firstElementChild);
            document.body.classList.add('overflow-hidden');

            requestAnimationFrame(() => {
                document.getElementById('lead-overlay')?.classList.replace('opacity-0', 'opacity-100');
                const card = document.getElementById('lead-card');
                card?.classList.remove('opacity-0', 'translate-y-3');
            });

            // Mount the shared date picker (single-date, far maxDate so future meeting dates are selectable).
            leadDatePicker = window.FluxyDateRangePicker?.mount?.('#lf-date-host', {
                mode: 'single', start: todayKey, end: todayKey, defaultStart: todayKey, defaultEnd: todayKey,
                maxDate: '2099-12-31',
                onChange: ({ start }) => { leadDateKey = start; },
            });

            const modal = document.getElementById('lead-modal');
            modal.querySelector('[data-close]')?.addEventListener('click', window.closeLeadModal);
            document.getElementById('lead-overlay')?.addEventListener('click', window.closeLeadModal);
            document.getElementById('lead-form')?.addEventListener('submit', submitLead);
            document.addEventListener('keydown', escClose);
        };

        function escClose(e) { if (e.key === 'Escape') window.closeLeadModal(); }

        window.closeLeadModal = function() {
            const modal = document.getElementById('lead-modal');
            if (!modal) return;
            document.removeEventListener('keydown', escClose);
            try { leadDatePicker?.destroy?.(); } catch (_) {}
            leadDatePicker = null;
            document.getElementById('lead-overlay')?.classList.replace('opacity-100', 'opacity-0');
            const card = document.getElementById('lead-card');
            card?.classList.add('opacity-0', 'translate-y-3');
            document.body.classList.remove('overflow-hidden');
            setTimeout(() => modal.remove(), 200);
        };

        async function submitLead(e) {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;
            const name = document.getElementById('lf-name').value.trim();
            const gender = document.getElementById('lf-gender').value;
            const email = document.getElementById('lf-email').value.trim();
            const time = document.getElementById('lf-time').value || '15:00';
            const role = document.getElementById('lf-role').value.trim();
            const company = document.getElementById('lf-company').value.trim();

            if (!name) return window.showToast('Please enter the lead\'s name.', 'error');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return window.showToast('Please enter a valid email.', 'error');
            if (!leadDateKey) return window.showToast('Please pick a meeting date.', 'error');

            // Meeting wall-clock is WIB (GMT+7) → build the exact instant.
            const meetingDate = new Date(`${leadDateKey}T${time}:00+07:00`);
            if (isNaN(meetingDate.getTime())) return window.showToast('Invalid meeting date/time.', 'error');
            const meetingISO = meetingDate.toISOString();

            const btn = document.getElementById('lf-submit');
            btn.disabled = true;
            btn.textContent = 'Sending…';

            let ref;
            try {
                ref = await ds.addLead(user.uid, {
                    name, gender, email, role: role || undefined, company: company || undefined,
                    meeting_at: meetingDate, status: 'new',
                });
            } catch (err) {
                btn.disabled = false; btn.textContent = 'Save & send outreach';
                return window.showToast(err.message || 'Could not save the lead.', 'error');
            }

            try {
                await postOutreach({ name, gender, email, meetingISO, role, company });
                await ds.updateLead(user.uid, ref.id, { status: 'sent', last_sent_at: new Date() });
                window.showToast('Outreach sent to ' + email, 'success');
            } catch (err) {
                window.showToast('Lead saved, but the email failed: ' + (err.message || 'send error') + '. Use Resend.', 'error');
            }
            window.closeLeadModal();
            await window.loadLeads();
        }

        // ---- Row actions (resend / status / delete) ----
        document.getElementById('leads-table-body')?.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const id = btn.getAttribute('data-lead-id');
            const lead = allLeads.find(l => l.id === id);
            if (!lead) return;
            const user = auth.currentUser;
            if (!user) return;

            if (btn.dataset.action === 'delete') {
                const ok = await window.showConfirmDialog({ title: 'Delete this lead?', body: `<strong>${escapeHtml(lead.name || 'This lead')}</strong> will be removed from your list. This can't be undone.`, confirmLabel: 'Delete', cancelLabel: 'Cancel', tone: 'danger' });
                if (!ok) return;
                try { await ds.deleteLead(user.uid, id); window.showToast('Lead deleted.', 'info'); await window.loadLeads(); }
                catch (err) { window.showToast(err.message || 'Could not delete.', 'error'); }
                return;
            }

            if (btn.dataset.action === 'resend') {
                const meetingISO = meetingISOFromLead(lead);
                if (!meetingISO) return window.showToast('This lead has no meeting date.', 'error');
                const ok = await window.showConfirmDialog({ title: 'Resend outreach?', body: `Send the meeting reminder to <strong>${escapeHtml(lead.email)}</strong> again?`, confirmLabel: 'Resend', cancelLabel: 'Cancel' });
                if (!ok) return;
                try {
                    await postOutreach({ name: lead.name, gender: lead.gender, email: lead.email, meetingISO, role: lead.role, company: lead.company });
                    await ds.updateLead(user.uid, id, { status: 'sent', last_sent_at: new Date() });
                    window.showToast('Outreach resent to ' + lead.email, 'success');
                    await window.loadLeads();
                } catch (err) { window.showToast(err.message || 'Resend failed.', 'error'); }
            }
        });

        document.getElementById('leads-table-body')?.addEventListener('change', async (e) => {
            const sel = e.target.closest('[data-lead-status]');
            if (!sel) return;
            const id = sel.getAttribute('data-lead-id');
            const user = auth.currentUser;
            if (!user) return;
            try {
                await ds.updateLead(user.uid, id, { status: sel.value });
                const lead = allLeads.find(l => l.id === id);
                if (lead) lead.status = sel.value;
                window.showToast('Status updated.', 'success');
            } catch (err) { window.showToast(err.message || 'Could not update status.', 'error'); }
        });
    </script>
</body>
</html>
