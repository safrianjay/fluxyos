<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxyOS | Subscriptions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/shared-dashboard.css">
    <link rel="stylesheet" href="assets/css/platform-learning.css">
</head>
<body class="flex h-screen overflow-hidden text-gray-900 bg-gray-50">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-[220px] bg-white text-[#1E2F4A] flex flex-col flex-shrink-0 z-20 md:flex border-r border-slate-200 rounded-tl-[8px] overflow-hidden">
        <!-- Sidebar content will be loaded by sidebar-loader.js -->
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-30 sticky top-0 shadow-sm gap-6">
            <div class="flex items-center gap-4 flex-1">
                <button class="md:hidden text-gray-500 hover:text-gray-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="hidden sm:flex relative w-full max-w-lg">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input id="subscription-search-input" type="text" placeholder="Search subscriptions, SaaS tools..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-transparent rounded-lg text-[14px] focus:outline-none focus:bg-white focus:ring-1 focus:ring-[#EA580C] focus:border-[#EA580C] transition-all">
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.toggleFluxyAI()" data-tour-target="fluxy-ai-entry" class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-[#EA580C] border border-orange-100 rounded-lg text-[14px] font-bold hover:bg-orange-100 transition-all shadow-sm group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Fluxy AI
                </button>
            </div>
        </header>

        <div class="fluxy-page-shell">
            <div class="fluxy-page-canvas fluxy-section-stack">
                <div class="fluxy-page-header">
                    <div class="fluxy-page-header-main">
                        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Active Subscriptions</h1>
                        <p class="text-[14px] text-gray-500 mt-1">Track your recurring SaaS spend and renewal cycles.</p>
                    </div>
                    <div class="fluxy-page-actions">
                        <button onclick="window.showAddTransactionModal({ title: 'Add Subscription', submitLabel: 'Activate Subscription', defaultCategory: 'SaaS', context: 'subscription' })" data-tour-target="subscription-add" class="px-4 py-2 bg-[#EA580C] text-white rounded-lg text-[14px] font-bold hover:bg-[#D94E0B] transition-colors flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            Add Subscription
                        </button>
                    </div>
                </div>

                <div class="fluxy-table-card">
                    <div class="fluxy-table-card-header">
                        <div>
                            <h2 class="fluxy-table-title">Subscription list</h2>
                            <p class="fluxy-table-subtitle">Recurring SaaS spend and renewal status.</p>
                        </div>
                    </div>
                    <div id="sub-empty-state" class="hidden"></div>
                    <div id="sub-table-container" data-tour-target="subscription-table" class="fluxy-table-scroll">
                        <table class="fluxy-table min-w-[760px]">
                            <thead>
                                <tr class="fluxy-table-header">
                                    <th>Service</th>
                                    <th class="fluxy-table-money">Monthly Cost</th>
                                    <th data-tour-target="subscription-renewal">Renewal Date</th>
                                    <th>Status</th>
                                    <th class="fluxy-table-action" data-tour-target="subscription-manage">Action</th>
                                </tr>
                            </thead>
                            <tbody id="sub-table-body">
                                <tr>
                                    <td colspan="5" class="fluxy-table-loading-cell">Loading your subscriptions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/sidebar-loader.js"></script>
    <script src="assets/js/shared-dashboard.js"></script>
    <script src="assets/js/dashboard-i18n.js"></script>
    <script src="assets/js/fluxy-select.js"></script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import DataService from './assets/js/db-service.js';
        import { applyToPage } from './assets/js/onboarding-gate.js';
        import { continuePendingTourIfAny } from './assets/js/platform-learning.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDNynZIawmUQkTAVv71r4r9Sg661XvHVsA",
            authDomain: "fluxyos.com",
            projectId: "fluxyos",
            storageBucket: "fluxyos.firebasestorage.app",
            messagingSenderId: "1084252368929",
            appId: "1:1084252368929:web:da73dc0db83fe592c7f360"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const ds = new DataService(app);
        const linkedSubscriptionSearch = new URLSearchParams(window.location.search).get('search') || '';
        const linkedSubscriptionRecordId = new URLSearchParams(window.location.search).get('record');
        let allSubscriptions = [];
        let linkedSubscriptionSearchHandled = false;

        // Fluxy AI page context — Subscriptions has no KPI cards, so summarize the
        // loaded list (count, monthly recurring spend, renewals in the next 30 days).
        window.FluxyAIContext?.register?.(() => {
            const subs = Array.isArray(allSubscriptions) ? allSubscriptions : [];
            const monthly = subs.reduce((sum, s) => sum + (Number(s.amount) || 0), 0);
            const now = new Date();
            const in30 = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);
            const upcoming = subs.filter(s => {
                const d = s.renewal_date?.toDate ? s.renewal_date.toDate() : null;
                return d && d >= now && d <= in30;
            }).length;
            return {
                pageTitle: 'Subscriptions',
                summary: [
                    { label: 'Active subscriptions', value: String(subs.length) },
                    { label: 'Monthly recurring', value: 'Rp' + monthly.toLocaleString('id-ID') },
                    { label: 'Renewals (next 30 days)', value: String(upcoming), status: upcoming > 0 ? 'warning' : 'neutral' },
                ],
                filters: { search: (document.getElementById('subscription-search-input')?.value || '').trim() || null },
                selectedRecord: linkedSubscriptionRecordId ? { id: linkedSubscriptionRecordId } : null,
            };
        });
        if (linkedSubscriptionSearch) {
            const input = document.getElementById('subscription-search-input');
            if (input) input.value = linkedSubscriptionSearch;
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const gated = await applyToPage(user, { pageKey: 'subscriptions' });
                if (gated) {
                    sessionStorage.removeItem('fluxy_pending_tour');
                    sessionStorage.removeItem('fluxy_pending_tours');
                    return;
                }
                // Resolve the joined workspace before reading so members see shared data.
                try { const { resolveWorkspace } = await import('/assets/js/workspace-service.js'); await resolveWorkspace(app, user); } catch (_) {}
                await window.loadSubscriptions();
                // Real-time: surface a teammate's subscription changes via the refresh pill.
                window.FluxyLive?.attach({ collections: ['subscriptions'], reload: () => window.loadSubscriptions(), mode: 'prompt' });
                await continuePendingTourIfAny(user.uid);
            } else {
                window.location.replace('/login');
            }
        });

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function filterSubscriptions(query) {
            const q = String(query || '').trim().toLowerCase();
            if (!q) return allSubscriptions;
            return allSubscriptions.filter(sub => {
                const name = String(sub.name || sub.vendor_name || '').toLowerCase();
                const status = String(sub.status || 'active').toLowerCase();
                const category = String(sub.category || 'SaaS').toLowerCase();
                const amount = String(sub.amount || '');
                return name.includes(q) || status.includes(q) || category.includes(q) || amount.includes(q);
            });
        }

        function highlightLinkedSubscriptionRow() {
            if (!linkedSubscriptionRecordId) return;
            const rowEl = document.querySelector(`[data-subscription-id="${CSS.escape(linkedSubscriptionRecordId)}"]`);
            if (!rowEl) {
                // Subscriptions load in full (no date scope), so a missing row means the
                // record no longer exists — never an "out of range" condition.
                window.showToast?.('That subscription could not be found. It may have been deleted.', 'info');
                return;
            }
            window.highlightFluxyLinkedTarget?.(rowEl, {
                focus: document.getElementById('subscription-search-input'),
            });
        }

        function highlightLinkedSubscriptionSearchRows() {
            if (!linkedSubscriptionSearch || linkedSubscriptionSearchHandled || linkedSubscriptionRecordId) return;
            const rows = Array.from(document.querySelectorAll('#sub-table-body [data-subscription-id]'));
            if (!rows.length) return;
            linkedSubscriptionSearchHandled = true;
            window.setTimeout(() => {
                window.highlightFluxyLinkedTarget?.(rows, {
                    focus: document.getElementById('subscription-search-input'),
                });
            }, 120);
        }

        function renderSubscriptions() {
            const body = document.getElementById('sub-table-body');
            const tableContainer = document.getElementById('sub-table-container');
            const emptyContainer = document.getElementById('sub-empty-state');
            if (!body || !tableContainer || !emptyContainer) return;

            const subs = filterSubscriptions(document.getElementById('subscription-search-input')?.value || '');
            if (allSubscriptions.length === 0) {
                tableContainer.classList.add('hidden');
                emptyContainer.classList.remove('hidden');
                window.renderEmptyState('sub-empty-state', {
                    title: "No active subscriptions.",
                    description: "Track your SaaS stack burn rate. Add your first subscription to start monitoring recurring costs.",
                    buttonText: "Add First Subscription",
                    onAction: () => window.showAddTransactionModal({ title: 'Add Subscription', submitLabel: 'Activate Subscription', defaultCategory: 'SaaS', context: 'subscription' })
                });
                return;
            }

            tableContainer.classList.remove('hidden');
            emptyContainer.classList.add('hidden');
            if (subs.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="fluxy-table-loading-cell">No subscriptions match your search.</td></tr>`;
                return;
            }
            body.innerHTML = subs.map(sub => `
                <tr class="fluxy-table-row" data-subscription-id="${escapeHtml(sub.id)}">
                    <td class="fluxy-table-cell">
                        <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded bg-blue-50 flex items-center justify-center text-[14px]">
                            ${escapeHtml(sub.icon || 'S')}
                        </div>
                        <span class="fluxy-table-cell-primary">${escapeHtml(sub.name || sub.vendor_name || 'Subscription')}</span>
                        </div>
                    </td>
                    <td class="fluxy-table-cell fluxy-table-money font-bold">Rp${Number(sub.amount || 0).toLocaleString('id-ID')}</td>
                    <td class="fluxy-table-cell fluxy-table-cell-meta">${sub.renewal_date?.toDate().toLocaleDateString() || 'Next month'}</td>
                    <td class="fluxy-table-cell">
                        <span class="fluxy-table-status fluxy-status-success">Active</span>
                    </td>
                    <td class="fluxy-table-cell fluxy-table-action">
                        <button class="fluxy-table-action text-gray-400 hover:text-red-500 transition-colors">Manage</button>
                    </td>
                </tr>
            `).join('');
            highlightLinkedSubscriptionRow();
            highlightLinkedSubscriptionSearchRows();
        }

        window.loadSubscriptions = async function() {
            const user = auth.currentUser;
            if (!user) return;

            allSubscriptions = await ds.getSubscriptions(user.uid);
            renderSubscriptions();
        };

        document.getElementById('subscription-search-input')?.addEventListener('input', renderSubscriptions);
    </script>
</body>
</html>
